<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0866FF"/>
      <stop offset="100%" stop-color="#5C9CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feFlood flood-color="#0a1628" flood-opacity="0.35"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#vg)"/>
  <!-- subtle inner highlight -->
  <rect x="2" y="2" width="60" height="30" rx="12" ry="12" fill="white" fill-opacity="0.08"/>
  <!-- the V — bold, centered, slightly tucked from baseline -->
  <path
    d="M 17 17 L 32 47 L 47 17"
    stroke="white"
    stroke-width="6.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />
</svg>
